---
# IBM Storage Protect Data Protection for DB2 - Query Playbook
#
# Purpose: Query DB2 backup information from Storage Protect
# Reference: docs/design/design-sp-db2.md
# Guide: docs/guides/data-protection-db2-guide.md
#
# Usage:
#   # Query all backups for a database
#   ansible-playbook -i inventory.ini \
#     ibm.storage_protect.dp_db2_query_playbook.yml \
#     -e "target_hosts=db2_servers" \
#     -e "db2_database=PRODDB" \
#     -e "db2_instance=db2inst1"
#
#   # Query specific backup type
#   ansible-playbook -i inventory.ini \
#     ibm.storage_protect.dp_db2_query_playbook.yml \
#     -e "db2_database=PRODDB" \
#     -e "db2_query_type=full" \
#     -e "db2_query_verbose=true"
#
# Required Variables:
#   - db2_database: Database name to query
#   - db2_instance: DB2 instance name
#
# Optional Variables:
#   - target_hosts: Target host group (default: 'all')
#   - db2_query_type: Type of query (full/log/tablespace/loadcopy)
#   - db2_query_backup_level: Backup level (incremental/delta/nonincremental)
#   - db2_query_verbose: Show verbose output (default: true)

- name: Query DB2 Backups from Storage Protect
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    db2_operation: "query"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - db2_database is defined
          - db2_database | length > 0
          - db2_instance is defined
          - db2_instance | length > 0
        fail_msg: "Required variables db2_database and db2_instance must be provided"
        success_msg: "Required variables are defined"

    - name: Display query parameters
      ansible.builtin.debug:
        msg:
          - "Target Host: {{ ansible_hostname }}"
          - "Operation: {{ db2_operation }}"
          - "Database: {{ db2_database }}"
          - "Instance: {{ db2_instance }}"
          - "Query Type: {{ db2_query_type | default('ALL') }}"
          - "Backup Level: {{ db2_query_backup_level | default('ALL') }}"
          - "Verbose Output: {{ db2_query_verbose | default(true) }}"

  roles:
    - role: ibm.storage_protect.dp_db2_manage

  post_tasks:
    - name: Display query results summary
      ansible.builtin.debug:
        msg:
          - "DB2 backup query completed"
          - "Database: {{ db2_database }}"
          - "Query Type: {{ db2_query_type | default('ALL') }}"
          - "Review the output above for available backups"
          - "Next Steps:"
          - "  1. Identify the backup timestamp for restore"
          - "  2. Verify backup integrity"
          - "  3. Plan restore operation if needed"
      when: ansible_play_batch | length > 0
...

